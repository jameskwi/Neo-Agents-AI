<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Neo Agents AI — Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #1a1f26;
    --surface: #222830;
    --surface-2: #2a3140;
    --surface-3: #323a4a;
    --border: #333d4d;
    --border-bright: #475264;
    --text: #e8edf5;
    --text-soft: #c5cdd9;
    --muted: #7a8699;
    --faint: #4f5666;
    --accent: #76ABAE;
    --accent-dim: #5e9295;
    --accent-soft: rgba(118,171,174,.14);
    --danger: #FF5722;
    --amber: #f0b429;
    --green: #4caf78;
    --indigo: #7c95ff;
    --purple: #c57ff5;
    --sans: "DM Sans", system-ui, sans-serif;
    --mono: "DM Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased}
  body{font-size:13px;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  ::selection{background:rgba(118,171,174,.35)}
  h1,h2,h3,h4,h5{font-family:var(--sans);margin:0;font-weight:700;letter-spacing:-.01em;color:var(--text)}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#3a4456;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#4a5468}

  .app{display:grid;grid-template-rows:56px 48px 1fr;height:100vh;width:100vw}

  /* HEADER */
  .header{display:flex;align-items:center;gap:16px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .logo{width:32px;height:32px;border-radius:7px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:800;font-size:14px;color:#1a1f26;letter-spacing:-.02em}
  .brand-name{font-family:var(--sans);font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.01em}
  .header-center{flex:1;display:flex;justify-content:center;gap:10px}
  .project-pill{display:inline-flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:var(--sans);font-size:12px;color:var(--text)}
  .project-pill .label{color:var(--muted);font-size:10.5px}
  .header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .meta-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);padding:5px 10px;border-radius:6px;color:var(--text-soft);font-size:11.5px}
  .meta-chip.phase{color:var(--accent);border-color:rgba(118,171,174,.3);background:rgba(118,171,174,.08)}
  .version{font-family:var(--sans);font-size:11px;color:var(--muted)}
  .notif-btn{position:relative;width:32px;height:32px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;color:var(--text-soft);transition:background .12s,border-color .12s}
  .notif-btn:hover{background:var(--surface-3);border-color:var(--border-bright)}
  .notif-dot{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--danger);color:#fff;font-size:9.5px;font-weight:500;display:inline-flex;align-items:center;justify-content:center;border:2px solid var(--surface);line-height:1}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#5e9295);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#0e1218;cursor:pointer;border:1px solid rgba(255,255,255,.06);transition:transform .15s}
  .user-avatar:hover{transform:scale(1.05)}

  /* TABS */
  .tabs{display:flex;align-items:stretch;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
  .tab{display:inline-flex;align-items:center;gap:8px;padding:0 18px;font-family:var(--sans);font-size:12px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;font-weight:500;border-bottom:2px solid transparent;transition:color .12s,border-color .12s}
  .tab:hover{color:var(--text-soft)}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
  .tab .count{font-size:10px;color:var(--muted);background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:1px 7px}
  .tab.on .count{color:var(--accent);border-color:rgba(118,171,174,.3);background:rgba(118,171,174,.08)}

  .content{overflow-y:auto;min-height:0;background:var(--bg)}
  .page{padding:24px;max-width:1480px;margin:0 auto}

  /* KPIs */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;transition:border-color .12s}
  .kpi:hover{border-color:var(--border-bright)}
  .kpi-head{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .kpi-head .ico{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface-2)}
  .kpi-num{font-family:var(--sans);font-size:32px;font-weight:500;letter-spacing:-.02em;line-height:1}
  .kpi-num.accent{color:var(--accent)}
  .kpi-num.amber{color:var(--amber)}
  .kpi-num.green{color:var(--green)}
  .kpi-foot{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .delta{color:var(--green)}

  .two-col{display:grid;grid-template-columns:1.1fr 1fr;gap:14px;margin-top:14px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
  .panel-title{font-size:13px;font-weight:700;color:var(--text)}
  .panel-action{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .panel-action:hover{color:var(--accent)}

  /* agent rows */
  .agent-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);transition:background .1s}
  .agent-row:hover{background:var(--surface-2)}
  .agent-row:last-child{border-bottom:none}
  .agent-badge{width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:500;font-size:11px;color:#0e1218;letter-spacing:.04em}
  .agent-info{display:flex;flex-direction:column;gap:5px;min-width:0}
  .agent-name{font-size:13px;font-weight:600;color:var(--text)}
  .agent-meta{font-size:10.5px;color:var(--muted);display:flex;gap:10px}
  .agent-stat{text-align:right;display:flex;flex-direction:column;gap:3px}
  .agent-stat .pct{font-size:12px;color:var(--text)}
  .agent-stat .ts{font-size:10px;color:var(--muted)}

  /* task rows */
  .task-row{padding:12px 18px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;transition:background .1s;cursor:pointer}
  .task-row:hover{background:var(--surface-2)}
  .task-row:last-child{border-bottom:none}
  .badge-sm{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:500;color:#0e1218;letter-spacing:.04em}
  .task-title{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .status-pill{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;font-weight:500}
  .status-backlog{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
  .status-progress{background:rgba(240,180,41,.12);color:var(--amber);border:1px solid rgba(240,180,41,.3)}
  .status-review{background:rgba(118,171,174,.12);color:var(--accent);border:1px solid rgba(118,171,174,.3)}
  .status-done{background:rgba(76,175,120,.12);color:var(--green);border:1px solid rgba(76,175,120,.3)}
  .task-date{font-size:10.5px;color:var(--muted);white-space:nowrap}

  /* pipeline */
  .pipeline{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
  .pipeline-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .pipeline-bar{height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;display:flex;border:1px solid var(--border)}
  .pipeline-bar > span{height:100%;display:block}
  .pipeline-legend{display:flex;gap:18px;margin-top:12px;font-size:10.5px;color:var(--muted)}
  .pipeline-legend .sw{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}

  /* BOARD */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;height:100%}
  .col{background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;min-height:0;overflow:hidden;border-top:3px solid var(--col-color, var(--muted))}
  .col-head{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text)}
  .col-count{font-size:10.5px;color:var(--col-color, var(--muted));background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:1px 8px}
  .col-body{padding:12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:12px 13px;display:flex;flex-direction:column;gap:10px;transition:border-color .12s,background .12s;cursor:pointer}
  .card:hover{border-color:var(--accent);background:var(--surface-3)}
  .card-top{display:flex;align-items:center;gap:8px}
  .card-id{font-size:10px;color:var(--muted);margin-left:auto}
  .card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.35}
  .card-foot{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--muted)}
  .card-foot .badge-sm{width:22px;height:22px;border-radius:5px;font-size:9px}
  .card-foot .spacer{flex:1}
  .steps-row{display:flex;gap:5px;align-items:center}
  .step-dot{width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:600;letter-spacing:.03em;color:#0e1218}
  .step-dot.done{background:var(--green)}
  .step-dot.active{background:var(--amber)}
  .step-dot.idle{background:var(--surface-3);color:var(--faint);border:1px solid var(--border)}

  /* DOCS */
  .docs{display:grid;grid-template-columns:220px 1fr;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .doc-side{border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  .doc-search{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
  .doc-search input{background:none;border:none;outline:none;font-family:var(--sans);font-size:12px;color:var(--text);flex:1}
  .doc-search input::placeholder{color:var(--faint)}
  .doc-list{overflow-y:auto;flex:1;padding:6px}
  .doc-group{}
  .doc-group-head{display:flex;align-items:center;gap:7px;padding:7px 10px;width:100%;text-align:left;border-radius:6px;cursor:pointer;transition:background .1s}
  .doc-group-head:hover{background:var(--surface-2)}
  .doc-group-head .ico{width:20px;height:20px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#0e1218;flex-shrink:0}
  .doc-group-head .label{flex:1;font-size:11.5px;color:var(--text-soft);font-weight:500}
  .doc-group-head .chev{transition:transform .15s;color:var(--faint)}
  .doc-group.open .doc-group-head .chev{transform:rotate(90deg)}
  .doc-files{padding:2px 0 4px 28px;display:flex;flex-direction:column;gap:1px}
  .doc-file{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;width:100%;text-align:left;color:var(--muted);font-size:11px;transition:background .1s,color .1s;cursor:pointer}
  .doc-file:hover{background:var(--surface-2);color:var(--text-soft)}
  .doc-file.active{background:var(--accent-soft);color:var(--accent)}
  .doc-file .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .doc-main{display:flex;flex-direction:column;min-height:0}
  .doc-toolbar{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
  .breadcrumb{flex:1;font-size:11.5px;color:var(--muted)}
  .breadcrumb b{color:var(--text-soft)}
  .btn-dl{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#0e1218;padding:7px 14px;border-radius:7px;font-size:11px;font-weight:500;letter-spacing:.04em;transition:background .12s}
  .btn-dl:hover{background:#86bdc0}
  .btn-secondary{display:inline-flex;align-items:center;gap:7px;background:var(--surface-2);color:var(--text-soft);padding:7px 12px;border-radius:7px;font-size:11px;border:1px solid var(--border);transition:background .12s}
  .btn-secondary:hover{background:var(--surface-3);border-color:var(--border-bright)}
  .doc-body{flex:1;overflow-y:auto;padding:32px 48px 80px}
  .doc-inner{max-width:780px;margin:0 auto}
  .frontmatter{background:rgba(118,171,174,.06);border:1px solid rgba(118,171,174,.3);border-left-width:3px;border-radius:6px;padding:14px 18px;margin-bottom:28px;font-size:11.5px;color:var(--text-soft);line-height:1.8}
  .frontmatter .key{color:var(--accent)}
  .doc-body h1{font-size:28px;font-weight:800;margin:0 0 10px;letter-spacing:-.02em}
  .doc-body .lede{font-size:11px;color:var(--muted);margin:0 0 28px}
  .doc-body h2{font-size:17px;font-weight:700;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .doc-body h3{font-size:13px;font-weight:700;color:var(--accent);margin:18px 0 6px}
  .doc-body p{font-size:12.5px;color:var(--text-soft);line-height:1.75;margin:0 0 12px}
  .doc-body p strong{color:var(--text);font-weight:500}
  .doc-body ul{font-size:12.5px;color:var(--text-soft);padding-left:22px;margin:0 0 14px;line-height:1.7}
  .doc-body li{margin:3px 0}
  .doc-body code{font-family:var(--mono);font-size:11.5px;background:var(--surface-2);color:var(--accent);padding:1.5px 5px;border-radius:3px;border:1px solid var(--border)}
  .doc-body pre{background:#0e1218;border:1px solid var(--border);border-radius:8px;padding:16px 18px;font-family:var(--mono);font-size:11.5px;line-height:1.7;color:var(--text-soft);overflow-x:auto;margin:14px 0 20px}
  .doc-body table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:14px 0;font-size:11.5px}
  .doc-body thead th{background:var(--surface-2);color:var(--muted);font-weight:500;text-align:left;padding:9px 12px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
  .doc-body tbody td{padding:10px 12px;color:var(--text-soft);border-bottom:1px solid var(--border)}
  .doc-body tbody tr:nth-child(even) td{background:var(--surface-2)}
  .doc-body tbody tr:last-child td{border-bottom:none}
  .doc-body blockquote{border-left:3px solid var(--accent);margin:0 0 14px;padding:10px 16px;background:var(--accent-soft);border-radius:0 6px 6px 0}
  .doc-body blockquote p{margin:0;color:var(--text-soft)}

  /* TIMELINE */
  .phases{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px 24px;margin-bottom:18px}
  .phase{display:flex;flex-direction:column;gap:10px;position:relative;padding:0 14px}
  .phase + .phase::before{content:"";position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:1px;height:60px;background:var(--border)}
  .phase-head{display:flex;align-items:center;gap:10px}
  .phase-num{width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);font-weight:500}
  .phase.done .phase-num{background:var(--accent);color:#0e1218;border-color:var(--accent)}
  .phase.active .phase-num{background:rgba(118,171,174,.12);color:var(--accent);border-color:var(--accent);animation:pulse 2s ease-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(118,171,174,.6)}50%{box-shadow:0 0 0 6px rgba(118,171,174,0)}}
  .phase-meta{flex:1;display:flex;flex-direction:column}
  .phase-label{font-size:9.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .phase-name{font-weight:700;font-size:14px;color:var(--text)}
  .phase-bar{height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;border:1px solid var(--border)}
  .phase-bar > span{height:100%;display:block;background:var(--accent)}
  .phase.upcoming .phase-bar > span{background:var(--faint)}
  .phase-dates{font-size:10.5px;color:var(--muted);display:flex;justify-content:space-between}
  .phase-group{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .phase-group-head{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
  .phase-group-head .num{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
  .phase-group-head.done .num{background:var(--accent);color:#0e1218;border-color:var(--accent)}
  .phase-group-head.active .num{background:rgba(118,171,174,.12);color:var(--accent);border-color:var(--accent)}
  .phase-group-head .name{font-size:14px;font-weight:700;flex:1}
  .phase-group-head .info{font-size:11px;color:var(--muted)}
  .milestone{display:grid;grid-template-columns:120px auto 1fr auto auto;gap:18px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border)}
  .milestone:last-child{border-bottom:none}
  .milestone:hover{background:var(--surface-2)}
  .ms-date{font-size:11px;color:var(--muted)}
  .ms-connector{position:relative;width:14px;height:14px;display:flex;align-items:center;justify-content:center}
  .ms-connector .d{width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);background:var(--bg)}
  .ms-connector.done .d{background:var(--accent)}
  .ms-connector.active .d{background:var(--accent);box-shadow:0 0 0 4px rgba(118,171,174,.15)}
  .ms-title{font-size:13px;font-weight:600;color:var(--text)}

  /* EMPTY */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--muted);text-align:center}
  .empty .t{font-size:14px;color:var(--text-soft);font-weight:600}
  .empty .s{font-size:11px;color:var(--muted)}

  /* LOADING */
  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px;gap:10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface-3);border:1px solid var(--border-bright);border-radius:8px;padding:10px 18px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px;z-index:100}
  .check{color:var(--green)}

  /* TASK DETAIL MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(10,14,20,.7);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:center;justify-content:center}
  .modal{background:var(--surface);border:1px solid var(--border-bright);border-radius:12px;width:800px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border)}
  .modal-title{font-size:15px;font-weight:700;flex:1}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Auth token ── */
// Token is passed as ?token=... when the dashboard skill opens the browser.
// Persisted in sessionStorage so refreshes don't break the session.
const _urlToken = new URLSearchParams(window.location.search).get("token") || "";
if (_urlToken) sessionStorage.setItem("neo_token", _urlToken);
const NEO_TOKEN = _urlToken || sessionStorage.getItem("neo_token") || "";
function withToken(path) {
  if (!NEO_TOKEN) return path;
  const sep = path.includes("?") ? "&" : "?";
  return path + sep + "token=" + encodeURIComponent(NEO_TOKEN);
}

/* ── Agent definitions (Neo Agents AI) ── */
const AGENTS = {
  BA: { name: "Business Analyst",    color: "#7C95FF", role: "Requirements & BRDs",       docDir: "BA"   },
  SA: { name: "Solution Architect",  color: "#C57FF5", role: "System & data design",      docDir: "SA"   },
  DS: { name: "Designer",            color: "#FF6F91", role: "Wireframes & UI prompts",   docDir: "DS"   },
  DEV:{ name: "Engineer",            color: "#FFB547", role: "Implementation specs",       docDir: "DEV"  },
  PM: { name: "PM",                  color: "#76ABAE", role: "Task board & tracking",      docDir: "PM"   },
};

/* ── Column config ── */
const COLS = {
  Backlog:     { color: "#7a8699", statusKey: "🔲 not started" },
  "In Progress":{ color: "#f0b429", statusKey: "⏳ in progress" },
  Review:      { color: "#76ABAE", statusKey: "🔍 review"       },
  Done:        { color: "#4caf78", statusKey: "✅ done"          },
};


/* ── Icons ── */
const I = {
  search: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6.5" stroke="currentColor" strokeWidth="1.6"/><path d="M20 20l-3.5-3.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>,
  chev:   () => <svg className="chev" width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  doc:    () => <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/><path d="M14 3v6h6" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  dl:     () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  x:      () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
  board:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="6" height="16" rx="1.5" stroke="currentColor" strokeWidth="1.6"/><rect x="11" y="4" width="6" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.6"/><rect x="19" y="4" width="2" height="16" rx="1" stroke="currentColor" strokeWidth="1.6"/></svg>,
  files:  () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/><path d="M14 3v6h6" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  time:   () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="1.6"/><path d="M12 7v5l3 2" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>,
  list:   () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>,
};

/* ── Simple markdown renderer ── */
function renderMarkdown(md) {
  if (!md) return "";
  let html = md
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    // code blocks
    .replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) => `<pre>${c.trim()}</pre>`)
    // inline code
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    // headings
    .replace(/^#### (.+)$/gm,"<h4>$1</h4>")
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    // bold / italic
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    // blockquote
    .replace(/^> (.+)$/gm,"<blockquote><p>$1</p></blockquote>")
    // hr
    .replace(/^---$/gm,"<hr style='border:none;border-top:1px solid var(--border);margin:18px 0'/>")
    // checklist
    .replace(/^- \[x\] (.+)$/gm,"<li style='list-style:none;color:var(--green)'>✅ $1</li>")
    .replace(/^- \[ \] (.+)$/gm,"<li style='list-style:none;color:var(--muted)'>🔲 $1</li>")
    // table rows
    .replace(/^\|(.+)\|$/gm, (row) => {
      const cells = row.split("|").slice(1,-1);
      const isHeader = /^[\s\-|]+$/.test(row.replace(/[^\-|]/g,"x"));
      if (isHeader) return "";
      const tag = "td";
      return "<tr>" + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join("") + "</tr>";
    })
    // ul / ol
    .replace(/^[-*] (.+)$/gm,"<li>$1</li>")
    .replace(/^\d+\. (.+)$/gm,"<li>$1</li>")
    // paragraphs — wrap consecutive non-tag lines
    .split("\n").map(l => {
      if (/^<(h[1-4]|li|pre|blockquote|hr|tr)/.test(l.trim()) || l.trim()==="") return l;
      return `<p>${l}</p>`;
    }).join("\n");

  // wrap consecutive <li> in <ul>
  html = html.replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`);
  // wrap consecutive <tr> in <table>
  html = html.replace(/(<tr>[\s\S]*?<\/tr>(\n|$))+/g, m => `<table>${m}</table>`);
  return html;
}

/* ── Data fetching ── */
async function fetchTasks() {
  try {
    const r = await fetch(withToken("/api/tasks"));
    if (!r.ok) return [];
    const d = await r.json();
    return d.tasks || [];
  } catch { return []; }
}

async function fetchConfig() {
  try {
    const r = await fetch(withToken("/api/config"));
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function fetchDocs() {
  try {
    const r = await fetch(withToken("/api/docs"));
    if (!r.ok) return {};
    return await r.json();
  } catch { return {}; }
}

async function fetchDocContent(path) {
  try {
    const r = await fetch(withToken("/api/doc?path=" + encodeURIComponent(path)));
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

/* ── App ── */
function App() {
  const [tab, setTab]       = useState("overview");
  const [tasks, setTasks]   = useState([]);
  const [config, setConfig] = useState(null);
  const [docs, setDocs]     = useState({});
  const [loading, setLoading] = useState(true);
  const [toast, setToast]   = useState(null);
  const [selected, setSelected] = useState(null); // task detail modal

  const load = useCallback(async () => {
    const [t, c, d] = await Promise.all([fetchTasks(), fetchConfig(), fetchDocs()]);
    setTasks(t); setConfig(c); setDocs(d);
    setLoading(false);
  }, []);

  useEffect(() => {
    load();
    const iv = setInterval(load, 5000); // poll every 5s
    return () => clearInterval(iv);
  }, [load]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2800); };

  const TABS = [
    { id:"overview", label:"Overview", icon:<I.list /> },
    { id:"board",    label:"Board",    icon:<I.board />, count: tasks.filter(t=>t.column==="In Progress").length },
    { id:"docs",     label:"Docs",     icon:<I.files /> },
    { id:"timeline", label:"Timeline", icon:<I.time /> },
  ];

  const projectName = config?.project_name || "—";
  const projectType = config?.project_type || "";
  const version     = config?.neo_agents_version || "1.2.0";

  return (
    <div className="app">
      {/* HEADER */}
      <div className="header">
        <div className="brand">
          <div className="logo">NA</div>
          <span className="brand-name">Neo Agents AI</span>
        </div>
        <div className="header-center">
          <div className="project-pill">
            <span className="label">project</span>
            <span style={{color:"var(--accent)"}}>›</span>
            <span>{projectName}</span>
          </div>
          {projectType && (
            <div className="meta-chip phase">
              <span>{projectType}</span>
            </div>
          )}
        </div>
        <div className="header-right">
          <span className="version">v{version}</span>
          <div className="user-avatar">M</div>
        </div>
      </div>

      {/* TABS */}
      <div className="tabs">
        {TABS.map(t => (
          <button key={t.id} className={"tab" + (tab===t.id?" on":"")} onClick={()=>setTab(t.id)}>
            {t.icon}<span>{t.label}</span>
            {t.count != null && <span className="count">{t.count}</span>}
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div className="content">
        {loading
          ? <div className="loading"><div className="spinner"/><span>Loading project data…</span></div>
          : <>
              {tab==="overview" && <Overview tasks={tasks} docs={docs} onSelect={setSelected}/>}
              {tab==="board"    && <Board tasks={tasks} setTasks={setTasks} onSelect={setSelected} showToast={showToast}/>}
              {tab==="docs"     && <Docs docs={docs}/>}
              {tab==="timeline" && <Timeline tasks={tasks} docs={docs}/>}
            </>
        }
      </div>

      {/* Task detail modal */}
      {selected && <TaskModal task={selected} onClose={()=>setSelected(null)}/>}

      {toast && <div className="toast"><span className="check">✓</span>{toast}</div>}
    </div>
  );
}

/* ── Overview ── */
function Overview({ tasks, docs, onSelect }) {
  const totalDocs = Object.values(docs).reduce((n,arr) => n + arr.length, 0);
  const inProgress = tasks.filter(t => t.column === "In Progress").length;
  const done       = tasks.filter(t => t.column === "Done").length;
  const backlog    = tasks.filter(t => t.column === "Backlog").length;
  const review     = tasks.filter(t => t.column === "Review").length;
  const total      = tasks.length;

  const recent = [...tasks].sort((a,b) => new Date(b.updated_at||0) - new Date(a.updated_at||0)).slice(0,5);

  return (
    <div className="page">
      <div className="kpi-grid">
        <div className="kpi">
          <div className="kpi-head"><span>Total Tasks</span><span className="ico">📋</span></div>
          <div className={"kpi-num accent"}>{total}</div>
          <div className="kpi-foot"><span>{inProgress} in progress</span></div>
        </div>
        <div className="kpi">
          <div className="kpi-head"><span>In Progress</span><span className="ico">⚡</span></div>
          <div className="kpi-num amber">{inProgress}</div>
          <div className="kpi-foot"><span>{review} in review</span></div>
        </div>
        <div className="kpi">
          <div className="kpi-head"><span>Completed</span><span className="ico">✓</span></div>
          <div className="kpi-num green">{done}</div>
          <div className="kpi-foot"><span>{total > 0 ? Math.round(done/total*100) : 0}% done</span></div>
        </div>
        <div className="kpi">
          <div className="kpi-head"><span>Agent Docs</span><span className="ico">📄</span></div>
          <div className="kpi-num accent">{totalDocs}</div>
          <div className="kpi-foot"><span>across all agents</span></div>
        </div>
      </div>

      <div className="two-col">
        {/* Agents */}
        <div className="panel">
          <div className="panel-head">
            <span className="panel-title">Agents</span>
          </div>
          {Object.entries(AGENTS).map(([code, ag]) => {
            const agentDocs = (docs[ag.docDir] || []).length;
            const agentTasks = tasks.filter(t => t.steps && t.steps[code.toLowerCase()] === "✅ done").length;
            return (
              <div key={code} className="agent-row">
                <div className="agent-badge" style={{background:ag.color}}>{code}</div>
                <div className="agent-info">
                  <div className="agent-name">{ag.name}</div>
                  <div className="agent-meta"><span>{ag.role}</span></div>
                </div>
                <div className="agent-stat">
                  <span className="pct">{agentDocs} docs</span>
                  <span className="ts">{agentTasks} tasks done</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* Recent tasks */}
        <div className="panel">
          <div className="panel-head">
            <span className="panel-title">Recent Tasks</span>
          </div>
          {recent.length === 0
            ? <div className="empty"><div className="t">No tasks yet</div><div className="s">Run /neo:ba to create your first task</div></div>
            : recent.map(t => {
                const agent = Object.keys(AGENTS).find(k => t.steps && t.steps[k.toLowerCase()] === "✅ done") || "BA";
                const colKey = t.column === "In Progress" ? "progress" : (t.column||"backlog").toLowerCase();
                return (
                  <div key={t.id} className="task-row" onClick={() => onSelect(t)}>
                    <span className="badge-sm" style={{background: AGENTS[agent]?.color || "#76ABAE"}}>{agent}</span>
                    <div>
                      <div className="task-title">{t.title}</div>
                      <div style={{fontSize:10.5,color:"var(--muted)",marginTop:3}}>{t.id}</div>
                    </div>
                    <span className={"status-pill status-" + colKey}>{t.column}</span>
                    <span className="task-date">{t.created_at ? t.created_at.slice(0,10) : ""}</span>
                  </div>
                );
              })
          }
        </div>
      </div>

      {/* Pipeline bar */}
      {total > 0 && (
        <div className="pipeline">
          <div className="pipeline-head">
            <span className="panel-title">Task Pipeline</span>
            <span style={{fontSize:10.5,color:"var(--muted)"}}>{total} total · {total>0?Math.round(done/total*100):0}% complete</span>
          </div>
          <div className="pipeline-bar">
            <span style={{width:(backlog/total*100)+"%", background:"var(--muted)"}}/>
            <span style={{width:(inProgress/total*100)+"%", background:"var(--amber)"}}/>
            <span style={{width:(review/total*100)+"%", background:"var(--accent)"}}/>
            <span style={{width:(done/total*100)+"%", background:"var(--green)"}}/>
          </div>
          <div className="pipeline-legend">
            <span><span className="sw" style={{background:"var(--muted)"}}/>Backlog · {backlog}</span>
            <span><span className="sw" style={{background:"var(--amber)"}}/>In Progress · {inProgress}</span>
            <span><span className="sw" style={{background:"var(--accent)"}}/>Review · {review}</span>
            <span><span className="sw" style={{background:"var(--green)"}}/>Done · {done}</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Board ── */
function Board({ tasks, setTasks, onSelect, showToast }) {
  const moveTask = async (taskId, newCol) => {
    try {
      await fetch(withToken("/api/task/move"), {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ id: taskId, column: newCol })
      });
      setTasks(prev => prev.map(t => t.id === taskId ? {...t, column: newCol} : t));
      showToast("Moved to " + newCol);
    } catch { showToast("Move failed — check server"); }
  };

  return (
    <div className="page" style={{height:"calc(100% - 0px)"}}>
      <div className="board">
        {Object.entries(COLS).map(([colName, col]) => {
          const cards = tasks.filter(t => (t.column || "Backlog") === colName);
          return (
            <div key={colName} className="col" style={{"--col-color": col.color}}>
              <div className="col-head">
                <span className="col-title">{colName}</span>
                <span className="col-count">{cards.length}</span>
              </div>
              <div className="col-body">
                {cards.length === 0
                  ? <div style={{fontSize:11,color:"var(--faint)",padding:"12px 0",textAlign:"center"}}>—</div>
                  : cards.map(c => {
                      const agent = Object.keys(AGENTS).find(k => c.steps && c.steps[k.toLowerCase()] === "✅ done") || "BA";
                      return (
                        <div key={c.id} className="card" onClick={() => onSelect(c)}>
                          <div className="card-top">
                            <span className="card-id">{c.id}</span>
                          </div>
                          <div className="card-title">{c.title}</div>
                          <div className="card-foot">
                            <span className="badge-sm" style={{background:AGENTS[agent]?.color||"#76ABAE"}}>{agent}</span>
                            <StepDots steps={c.steps}/>
                            <span className="spacer"/>
                            <span>{c.created_at ? c.created_at.slice(0,10) : ""}</span>
                          </div>
                          {/* Move buttons */}
                          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                            {Object.keys(COLS).filter(k=>k!==colName).map(k => (
                              <button key={k}
                                style={{fontSize:9,padding:"2px 7px",borderRadius:4,background:"var(--surface)",border:"1px solid var(--border)",color:"var(--muted)",cursor:"pointer"}}
                                onClick={(e)=>{e.stopPropagation();moveTask(c.id,k)}}
                              >→ {k}</button>
                            ))}
                          </div>
                        </div>
                      );
                    })
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StepDots({ steps }) {
  if (!steps) return null;
  const agents = ["ba","sa","ds","dev"];
  return (
    <div className="steps-row">
      {agents.map(a => {
        const v = steps[a] || "🔲 not started";
        const cls = v === "✅ done" ? "done" : v === "⏳ in progress" ? "active" : "idle";
        return <span key={a} className={"step-dot " + cls} title={a.toUpperCase() + ": " + v}>{a.toUpperCase().slice(0,1)}</span>;
      })}
    </div>
  );
}

/* ── Task Detail Modal ── */
function TaskModal({ task, onClose }) {
  const [activeTab, setActiveTab] = useState("brd");
  const [content, setContent] = useState({});
  const [loadingDoc, setLoadingDoc] = useState(false);

  const docMap = {
    brd: task.docs?.ba_doc,
    sa:  task.docs?.sa_doc,
    ds:  task.docs?.ds_doc,
    dev: task.docs?.dev_doc,
    spec:task.docs?.spec_doc,
  };

  useEffect(() => {
    const path = docMap[activeTab];
    if (!path || content[activeTab]) return;
    setLoadingDoc(true);
    fetchDocContent(path).then(text => {
      setContent(prev => ({...prev, [activeTab]: text || "_No content yet._"}));
      setLoadingDoc(false);
    });
  }, [activeTab]);

  const steps = task.steps || {};
  const stepInfo = [
    { key:"ba",  label:"BA",  val: steps.ba  },
    { key:"sa",  label:"SA",  val: steps.sa  },
    { key:"ds",  label:"DS",  val: steps.ds  },
    { key:"dev", label:"DEV", val: steps.dev },
  ];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <span className="modal-title">{task.title}</span>
          <span style={{fontSize:11,color:"var(--muted)",marginRight:8}}>{task.id}</span>
          <button className="modal-close" onClick={onClose}><I.x/></button>
        </div>

        {/* Step status badges */}
        <div style={{padding:"12px 20px",borderBottom:"1px solid var(--border)",display:"flex",gap:8,flexWrap:"wrap"}}>
          {stepInfo.map(s => {
            const v = s.val || "🔲 not started";
            const cls = v==="✅ done"?"done":v==="⏳ in progress"?"active":"idle";
            return (
              <span key={s.key} className={"step-badge "+cls}>
                {s.label} · {v}
              </span>
            );
          })}
        </div>

        <div className="modal-tabs">
          {Object.entries(docMap).map(([k,path]) => (
            <span key={k} className={"modal-tab"+(activeTab===k?" on":"")} onClick={()=>setActiveTab(k)}>
              {k.toUpperCase()}
            </span>
          ))}
        </div>

        <div className="modal-body doc-body">
          {loadingDoc
            ? <div className="loading"><div className="spinner"/></div>
            : <div className="doc-inner" dangerouslySetInnerHTML={{__html: renderMarkdown(content[activeTab] || "_Not generated yet. Run the agent first._")}}/>
          }
        </div>
      </div>
    </div>
  );
}

/* ── Docs ── */
function Docs({ docs }) {
  const [active, setActive] = useState(null);
  const [open, setOpen] = useState({BA:true,SA:false,DS:false,DEV:false,PM:false});
  const [query, setQuery] = useState("");
  const [content, setContent] = useState(null);
  const [loadingDoc, setLoadingDoc] = useState(false);

  const toggle = (code) => setOpen(o => ({...o, [code]: !o[code]}));

  const selectDoc = async (agentDir, file) => {
    const id = agentDir + "/" + file;
    setActive(id);
    setContent(null);
    setLoadingDoc(true);
    const path = `.ai-agents/docs/${agentDir}/${file}`;
    const text = await fetchDocContent(path);
    setContent(text || "_Empty document._");
    setLoadingDoc(false);
  };

  const filterFile = (f) => !query || f.toLowerCase().includes(query.toLowerCase());

  const [agentDir, fileName] = active ? active.split("/") : [null, null];

  return (
    <div className="page" style={{height:"100%"}}>
      <div className="docs" style={{height:"calc(100vh - 56px - 48px - 48px)"}}>
        <div className="doc-side">
          <div className="doc-search">
            <I.search/>
            <input placeholder="Search docs…" value={query} onChange={e=>setQuery(e.target.value)}/>
          </div>
          <div className="doc-list">
            {Object.entries(AGENTS).map(([code, ag]) => {
              const files = (docs[ag.docDir] || []).filter(filterFile);
              return (
                <div key={code} className={"doc-group"+(open[ag.docDir]?" open":"")}>
                  <button className="doc-group-head" onClick={()=>toggle(ag.docDir)}>
                    <I.chev/>
                    <span className="ico" style={{background:ag.color}}>{code}</span>
                    <span className="label">{ag.name}</span>
                    <span style={{fontSize:10,color:"var(--muted)"}}>{(docs[ag.docDir]||[]).length}</span>
                  </button>
                  {open[ag.docDir] && (
                    <div className="doc-files">
                      {files.length === 0
                        ? <div style={{fontSize:10.5,color:"var(--faint)",padding:"5px 8px",fontStyle:"italic"}}>
                            {(docs[ag.docDir]||[]).length === 0 ? "No docs yet" : "No matches"}
                          </div>
                        : files.map(f => {
                            const id = ag.docDir + "/" + f;
                            return (
                              <button key={f} className={"doc-file"+(active===id?" active":"")} onClick={()=>selectDoc(ag.docDir,f)}>
                                <I.doc/><span className="name">{f}</span>
                              </button>
                            );
                          })
                      }
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div className="doc-main">
          <div className="doc-toolbar">
            <span className="breadcrumb">
              {active ? <>docs / <b>{agentDir}</b> / <b style={{color:"var(--accent)"}}>{fileName}</b></> : <span style={{color:"var(--faint)"}}>select a document</span>}
            </span>
            {active && <>
              <button className="btn-secondary" onClick={()=>{navigator.clipboard?.writeText(window.location.href+"#"+active)}}>Copy link</button>
              <a className="btn-dl" href={withToken("/api/doc?path=.ai-agents/docs/"+active)} download={fileName}><I.dl/> Download</a>
            </>}
          </div>
          <div className="doc-body">
            <div className="doc-inner">
              {!active
                ? <div className="empty"><div className="t">Select a document</div><div className="s">Choose from the sidebar to view</div></div>
                : loadingDoc
                  ? <div className="loading"><div className="spinner"/></div>
                  : <div dangerouslySetInnerHTML={{__html: renderMarkdown(content || "")}}/>
              }
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Timeline ── */
function Timeline({ tasks, docs }) {
  // Derive milestone status from actual artifact presence in docs + tasks
  const hasBaDocs  = (docs.BA  || []).length > 0;
  const hasSaDocs  = (docs.SA  || []).length > 0;
  const hasDsDocs  = (docs.DS  || []).length > 0;
  const hasDevDocs = (docs.DEV || []).length > 0;
  const hasPmDocs  = (docs.PM  || []).length > 0;
  const doneTasks  = tasks.filter(t => t.column === "Done").length;

  function ms(status) { return status; } // identity helper for clarity

  const milestones = [
    { phase:1, date:"Week 3",  title:"M1 — Plugin scaffold + /neo:setup",  agent:"PM",  status: ms("done")                                                              },
    { phase:1, date:"Week 5",  title:"M2 — BA agent live (interview+BRD)",  agent:"BA",  status: hasBaDocs  ? ms("done") : ms("active")                                  },
    { phase:2, date:"Week 7",  title:"M3 — SA agent live (BRD→SSD)",        agent:"SA",  status: hasSaDocs  ? ms("done") : hasBaDocs  ? ms("active") : ms("upcoming")    },
    { phase:2, date:"Week 9",  title:"M4 — Designer agent live (SSD→UI)",   agent:"DS",  status: hasDsDocs  ? ms("done") : hasSaDocs  ? ms("active") : ms("upcoming")    },
    { phase:3, date:"Week 11", title:"M5 — Engineer agent live (→impl)",    agent:"DEV", status: hasDevDocs ? ms("done") : hasDsDocs  ? ms("active") : ms("upcoming")    },
    { phase:3, date:"Week 11", title:"M6 — PM tracking active",             agent:"PM",  status: hasPmDocs  ? ms("done") : hasDevDocs ? ms("active") : ms("upcoming")    },
    { phase:4, date:"Week 12", title:"M7 — Full E2E pipeline validated",    agent:"PM",  status: doneTasks >= 3 ? ms("done") : hasPmDocs ? ms("active") : ms("upcoming") },
    { phase:4, date:"Week 13", title:"M8 — Alpha public release",           agent:"PM",  status: ms("upcoming")                                                           },
  ];

  // Derive phase summary from milestone statuses
  function phaseState(n) {
    const items = milestones.filter(m => m.phase === n);
    if (items.every(m => m.status === "done")) return "done";
    if (items.some(m => m.status === "done" || m.status === "active")) return "active";
    return "upcoming";
  }
  function phasePct(n) {
    const items = milestones.filter(m => m.phase === n);
    if (!items.length) return 0;
    return Math.round(items.filter(m => m.status === "done").length / items.length * 100);
  }

  const phases = [
    { num:"01", label:"Foundation",    dates:"M1 – M2", state: phaseState(1), pct: phasePct(1) },
    { num:"02", label:"Architect + DS",dates:"M3 – M4", state: phaseState(2), pct: phasePct(2) },
    { num:"03", label:"Engineer + PM", dates:"M5 – M6", state: phaseState(3), pct: phasePct(3) },
    { num:"04", label:"E2E + Alpha",   dates:"M7 – M8", state: phaseState(4), pct: phasePct(4) },
  ];

  const grouped = phases.map(p => ({
    phase: p,
    items: milestones.filter(m => m.phase === parseInt(p.num, 10)),
  }));

  return (
    <div className="page">
      <div className="phases">
        {phases.map(p => (
          <div key={p.num} className={"phase "+p.state}>
            <div className="phase-head">
              <span className="phase-num">{p.num}</span>
              <div className="phase-meta">
                <span className="phase-label">Phase {p.num}</span>
                <span className="phase-name">{p.label}</span>
              </div>
            </div>
            <div className="phase-bar"><span style={{width:p.pct+"%"}}/></div>
            <div className="phase-dates"><span>{p.dates}</span><span>{p.pct}%</span></div>
          </div>
        ))}
      </div>

      {grouped.map(({phase, items}) => (
        <div key={phase.num} className="phase-group">
          <div className={"phase-group-head "+phase.state}>
            <span className="num">{phase.num}</span>
            <span className="name">{phase.label}</span>
            <span className="info">
              {items.filter(i=>i.status==="done").length} of {items.length} milestones
              {phase.state==="done"     && " · complete"}
              {phase.state==="active"   && " · in progress"}
              {phase.state==="upcoming" && " · upcoming"}
            </span>
          </div>
          {items.map(m => (
            <div key={m.date+m.title} className="milestone">
              <span className="ms-date">{m.date}</span>
              <span className={"ms-connector "+m.status}><span className="d"/></span>
              <span className="ms-title">{m.title}</span>
              <span className="badge-sm" style={{background:AGENTS[m.agent]?.color||"#76ABAE"}}>{m.agent}</span>
              <span className={"status-pill status-"+(m.status==="active"?"progress":m.status==="upcoming"?"backlog":"done")}>
                {m.status==="active"?"In Progress":m.status==="upcoming"?"Upcoming":"Done"}
              </span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
