<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Neo Agents AI — Component Gallery</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --bg: #1a1f26;
    --surface: #222830;
    --surface-2: #2a3140;
    --surface-3: #323a4a;
    --border: #333d4d;
    --border-bright: #475264;
    --text: #e8edf5;
    --text-soft: #c5cdd9;
    --muted: #7a8699;
    --faint: #4f5666;
    --accent: #76ABAE;
    --accent-dim: #5e9295;
    --accent-soft: rgba(118,171,174,.14);
    --danger: #FF5722;
    --amber: #f0b429;
    --green: #4caf78;
    --indigo: #7c95ff;
    --purple: #c57ff5;
    --sans: "DM Sans", system-ui, sans-serif;
    --mono: "DM Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{font-size:13px;line-height:1.5}
  ::selection{background:rgba(118,171,174,.35)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#3a4456;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#4a5468}

  /* gallery chrome */
  .g-nav a{transition:color .12s,background .12s,border-color .12s}
  .g-nav a:hover{color:var(--text)}
  .g-nav a.on{color:var(--accent);background:var(--accent-soft);border-color:rgba(118,171,174,.3)}

  /* keyframes referenced by components */
  @keyframes dotPulse{50%{opacity:.35}}
  @keyframes typingDot{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-2px)}}
  @keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(118,171,174,.6)}50%{box-shadow:0 0 0 6px rgba(118,171,174,0)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* rich content inside chat bubbles (injected HTML) */
  .chat-bubble strong{color:var(--text);font-weight:500}
  .chat-bubble ul{margin:6px 0;padding-left:20px}
  .chat-bubble li{margin:2px 0}
  .chat-bubble code{font-family:var(--mono);font-size:11px;background:var(--bg);color:var(--accent);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="gallery/data.jsx"></script>
<script type="text/babel" src="gallery/primitives.jsx"></script>
<script type="text/babel" src="gallery/shell.jsx"></script>
<script type="text/babel" src="gallery/queue.jsx"></script>
<script type="text/babel" src="gallery/board.jsx"></script>
<script type="text/babel" src="gallery/chat.jsx"></script>
<script type="text/babel" src="gallery/docs.jsx"></script>
<script type="text/babel" src="gallery/timeline.jsx"></script>
<script type="text/babel" src="gallery/app.jsx"></script>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#1a1f26"/>
  <rect x="30" y="30" width="40" height="40" rx="9" fill="#76ABAE"/>
  <text x="50" y="57" font-family="DM Sans, sans-serif" font-size="20" font-weight="800" fill="#1a1f26" text-anchor="middle">N</text>
</svg>
</template>
</body>
</html>
