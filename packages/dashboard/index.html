<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neo Agents AI — Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #1a1f26;
      --surface: #222830;
      --surface-2: #2a3140;
      --surface-3: #323a4a;
      --border: #333d4d;
      --border-bright: #475264;
      --text: #e8edf5;
      --text-soft: #c5cdd9;
      --muted: #7a8699;
      --faint: #4f5666;
      --accent: #76ABAE;
      --accent-dim: #5e9295;
      --accent-soft: rgba(118,171,174,.14);
      --danger: #FF5722;
      --amber: #f0b429;
      --green: #4caf78;
      --indigo: #7c95ff;
      --purple: #c57ff5;
      --sans: "DM Sans", system-ui, sans-serif;
      --mono: "DM Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body { font-size: 13px; line-height: 1.5; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
    ::selection { background: rgba(118,171,174,.35); }
    h1,h2,h3,h4,h5 { font-family: var(--sans); margin: 0; font-weight: 700; letter-spacing: -.01em; color: var(--text); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a4456; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5468; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 50; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 700px; max-width: 95vw; max-height: 82vh;
      display: flex; flex-direction: column; box-shadow: 0 24px 48px rgba(0,0,0,.45);
    }
    .modal-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; flex-shrink: 0;
    }
    .modal-tabs {
      display: flex; gap: 1px; padding: 10px 16px 0;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-tab {
      padding: 7px 15px; font-size: 12px; font-weight: 600; font-family: var(--sans);
      border-radius: 6px 6px 0 0; color: var(--muted); cursor: pointer;
      border: none; background: none; transition: color .15s, background .15s;
    }
    .modal-tab:hover { color: var(--text-soft); }
    .modal-tab.active {
      color: var(--accent); background: var(--surface-2);
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .modal-body {
      padding: 20px 22px; overflow-y: auto; flex: 1;
      font-size: 13px; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
